name = "hsd"
version = "1.0.0"
license = "BSD-2-Clause-Patent"
maintainer = ["DFTB+ developers group"]
author = ["DFTB+ developers group"]
copyright = "2026 DFTB+ developers group"
homepage = "https://github.com/elv3rs/hsd-fortran"
keywords = ["hsd", "parser", "dftb+", "structured-data"]
description = "HSD (Human-friendly Structured Data) parser for Fortran"

[library]
source-dir = "src"

[build]
auto-tests = true
auto-examples = false

[[test]]
name = "hsd_testapp"
source-dir = "test"
main = "testapp.f90"

[fortran]

[extra.fortitude.check]
select = ["C", "E", "S"]
respect-gitignore = false
ignore = []
per-file-ignores = { "test/**/*.f90" = ["C121"], "src/core/hsd_build_env.f90" = ["C071", "C072"] }
line-length = 100

[dev-dependencies]
fortuno = { git = "https://github.com/fortuno-repos/fortuno-fpm-serial.git" }

[[example]]
name = "simple_read"
source-dir = "example"
main = "simple_read.f90"

[[example]]
name = "config_demo"
source-dir = "example"
main = "config_demo.f90"

[[example]]
name = "matrix_demo"
source-dir = "example"
main = "matrix_demo.f90"
